<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// ── Storage + Encryption ─────────────────────────────────────────
const KEYS = { txns:"fin_txns", recurring:"fin_recurring", goals:"fin_goals", sync:"fin_sync" };
const LOCK = { verifier:"fin_lock_v", salt:"fin_lock_salt", fails:"fin_lock_fails", until:"fin_lock_until", bio:"fin_bio_cred", biowrap:"fin_bio_wrap" };
const PIN_LEN = 6;
const MAX_FAILS = 5;          // lock out after this many wrong tries
const LOCKOUT_MS = 60*1000;   // base lockout, escalates

// in-memory AES key (never persisted). null = locked / no PIN set yet.
let CRYPTO_KEY = null;

const enc = new TextEncoder();
const dec = new TextDecoder();
function b64(buf){ return btoa(String.fromCharCode(...new Uint8Array(buf))); }
function unb64(str){ return Uint8Array.from(atob(str), c=>c.charCodeAt(0)); }

// derive an AES-GCM key from PIN + salt via PBKDF2
async function deriveKey(pin, salt){
  const base = await crypto.subtle.importKey("raw", enc.encode(pin), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name:"PBKDF2", salt, iterations:210000, hash:"SHA-256" },
    base, { name:"AES-GCM", length:256 }, false, ["encrypt","decrypt"]
  );
}
// raw exportable key (used to wrap for biometric unlock)
async function deriveRawKey(pin, salt){
  const base = await crypto.subtle.importKey("raw", enc.encode(pin), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name:"PBKDF2", salt, iterations:210000, hash:"SHA-256" },
    base, { name:"AES-GCM", length:256 }, true, ["encrypt","decrypt"]
  );
}
async function encWith(key, plain){
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name:"AES-GCM", iv }, key, enc.encode(plain));
  return JSON.stringify({ iv:b64(iv), ct:b64(ct) });
}
async function decWith(key, payload){
  const { iv, ct } = JSON.parse(payload);
  const pt = await crypto.subtle.decrypt({ name:"AES-GCM", iv:unb64(iv) }, key, unb64(ct));
  return dec.decode(pt);
}
async function encryptStr(plain){ return encWith(CRYPTO_KEY, plain); }
async function decryptStr(payload){ return decWith(CRYPTO_KEY, payload); }

// PIN lifecycle
function hasPIN(){ return !!localStorage.getItem(LOCK.verifier); }
async function setupPIN(pin){
  const salt = crypto.getRandomValues(new Uint8Array(16));
  CRYPTO_KEY = await deriveKey(pin, salt);
  const verifier = await encryptStr("FIN_OK");
  localStorage.setItem(LOCK.salt, b64(salt));
  localStorage.setItem(LOCK.verifier, verifier);
  clearFails();
}
async function unlockPIN(pin){
  if(lockoutRemaining()>0) return false;
  const salt = unb64(localStorage.getItem(LOCK.salt));
  CRYPTO_KEY = await deriveKey(pin, salt);
  try {
    const v = await decryptStr(localStorage.getItem(LOCK.verifier));
    if(v !== "FIN_OK"){ CRYPTO_KEY=null; registerFail(); return false; }
    clearFails(); return true;
  } catch { CRYPTO_KEY=null; registerFail(); return false; }
}
function lockApp(){ CRYPTO_KEY = null; }

// ── Lockout tracking ──
function registerFail(){
  const n = (Number(localStorage.getItem(LOCK.fails))||0)+1;
  localStorage.setItem(LOCK.fails, String(n));
  if(n >= MAX_FAILS){
    // escalating lockout: 1min, then doubles each extra fail beyond threshold
    const extra = n - MAX_FAILS;
    const wait = LOCKOUT_MS * Math.pow(2, extra);
    localStorage.setItem(LOCK.until, String(Date.now()+wait));
  }
}
function clearFails(){ localStorage.removeItem(LOCK.fails); localStorage.removeItem(LOCK.until); }
function failCount(){ return Number(localStorage.getItem(LOCK.fails))||0; }
function lockoutRemaining(){
  const u = Number(localStorage.getItem(LOCK.until))||0;
  return Math.max(0, u - Date.now());
}

// ── Biometric (WebAuthn) ──
// We register a platform authenticator credential, then wrap the raw AES key
// with a key derived from the credential id, so Face/Touch ID can recover it.
function bioSupported(){ return !!(window.PublicKeyCredential && navigator.credentials); }
function bioEnabled(){ return !!localStorage.getItem(LOCK.bio); }

async function bioRegister(pin){
  if(!bioSupported()) throw new Error("不支援");
  const salt = unb64(localStorage.getItem(LOCK.salt));
  const rawKey = await deriveRawKey(pin, salt);
  // verify pin first by decrypting verifier
  const test = await decWith(rawKey, localStorage.getItem(LOCK.verifier));
  if(test !== "FIN_OK") throw new Error("PIN 錯誤");

  const userId = crypto.getRandomValues(new Uint8Array(16));
  const cred = await navigator.credentials.create({ publicKey:{
    challenge: crypto.getRandomValues(new Uint8Array(32)),
    rp:{ name:"我的記帳" },
    user:{ id:userId, name:"local-user", displayName:"我的記帳" },
    pubKeyCredParams:[{type:"public-key",alg:-7},{type:"public-key",alg:-257}],
    authenticatorSelection:{ authenticatorAttachment:"platform", userVerification:"required", residentKey:"preferred" },
    timeout:60000,
  }});
  const credId = b64(cred.rawId);
  // wrap rawKey bytes using a key derived from credId
  const exported = await crypto.subtle.exportKey("raw", rawKey);
  const wrapSalt = crypto.getRandomValues(new Uint8Array(16));
  const wrapKey = await deriveKey(credId, wrapSalt); // reuse PBKDF2 over credId
  const wrapped = await encWith(wrapKey, b64(exported));
  localStorage.setItem(LOCK.bio, credId);
  localStorage.setItem(LOCK.biowrap, JSON.stringify({ salt:b64(wrapSalt), data:wrapped }));
}
async function bioUnlock(){
  if(!bioEnabled()) return false;
  const credId = localStorage.getItem(LOCK.bio);
  try{
    await navigator.credentials.get({ publicKey:{
      challenge: crypto.getRandomValues(new Uint8Array(32)),
      allowCredentials:[{ type:"public-key", id:unb64(credId) }],
      userVerification:"required", timeout:60000,
    }});
    // recover rawKey
    const { salt, data } = JSON.parse(localStorage.getItem(LOCK.biowrap));
    const wrapKey = await deriveKey(credId, unb64(salt));
    const rawB64 = await decWith(wrapKey, data);
    CRYPTO_KEY = await crypto.subtle.importKey("raw", unb64(rawB64), {name:"AES-GCM"}, false, ["encrypt","decrypt"]);
    // validate
    const v = await decryptStr(localStorage.getItem(LOCK.verifier));
    if(v!=="FIN_OK"){ CRYPTO_KEY=null; return false; }
    clearFails(); return true;
  }catch{ return false; }
}
function bioDisable(){ localStorage.removeItem(LOCK.bio); localStorage.removeItem(LOCK.biowrap); }

// ── End-to-end encryption for cloud payload ──
// Derive a separate key from the sync token so the cloud only ever sees ciphertext.
async function e2eeKey(token){
  const base = await crypto.subtle.importKey("raw", enc.encode("e2ee::"+token), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name:"PBKDF2", salt:enc.encode("fin-e2ee-salt-v1"), iterations:150000, hash:"SHA-256" },
    base, { name:"AES-GCM", length:256 }, false, ["encrypt","decrypt"]
  );
}
async function e2eeEncrypt(token, obj){
  const key = await e2eeKey(token);
  return encWith(key, JSON.stringify(obj)); // returns {iv,ct} json string
}
async function e2eeDecrypt(token, payload){
  const key = await e2eeKey(token);
  return JSON.parse(await decWith(key, payload));
}

// encrypted load/save — falls back to plaintext for legacy/un-encrypted data
async function load(k){
  try{
    const raw = localStorage.getItem(k);
    if(!raw) return null;
    if(CRYPTO_KEY && raw.startsWith('{"iv"')){ return JSON.parse(await decryptStr(raw)); }
    return JSON.parse(raw); // legacy plaintext
  }catch{ return null; }
}
async function save(k,v){
  try{
    const json = JSON.stringify(v);
    if(CRYPTO_KEY){ localStorage.setItem(k, await encryptStr(json)); }
    else { localStorage.setItem(k, json); }
  }catch{}
}

// ── Defaults ─────────────────────────────────────────────────────
const DEFAULT_CATS = {
  expense:["餐飲","交通","購物","娛樂","醫療","教育","住房","水電","其他"],
  income: ["薪資","獎金","投資","副業","其他收入"],
  saving: ["定存","基金","股票","緊急備用金"],
  recurring:["車貸","房貸","保險","訂閱服務","電信費","水費","電費","稅金","其他固定"],
};
const ICONS = {
  餐飲:"🍜",交通:"🚌",購物:"🛍",娛樂:"🎬",醫療:"💊",教育:"📚",住房:"🏠",水電:"💡",其他:"📦",
  薪資:"💼",獎金:"🎁",投資:"📈",副業:"💻",其他收入:"💰",定存:"🏦",基金:"📊",股票:"📉",緊急備用金:"🛡",
  車貸:"🚗",房貸:"🏡",保險:"🔒",訂閱服務:"📱",電信費:"📡",水費:"💧",電費:"⚡",稅金:"🧾",其他固定:"🔁",
  旅遊金:"✈️",緊急金:"🛟",買車:"🚙",買房:"🏘",教育金:"🎓",退休金:"🌴",其他目標:"🎯",
};
const TYPE_COLOR = {
  expense:{bg:"#FF3B30",light:"#FFF1F0"}, income:{bg:"#34C759",light:"#F0FFF4"},
  saving:{bg:"#007AFF",light:"#EFF6FF"}, recurring:{bg:"#FF9500",light:"#FFF8EE"},
};
const TYPE_LABEL = { expense:"支出", income:"收入", saving:"儲蓄", recurring:"固定扣款" };
const FREQ_LABEL = { monthly:"每月", yearly:"每年", quarterly:"每季" };
const GOAL_CATS = ["旅遊金","緊急金","買車","買房","教育金","退休金","其他目標"];

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function today(){ return new Date().toISOString().slice(0,10); }
function fmtDate(d){ const t=new Date(d); return `${t.getMonth()+1}/${t.getDate()}`; }
function fmtMoney(n){ return Number(n||0).toLocaleString("zh-TW",{maximumFractionDigits:0}); }

// monthly-equivalent cost of a recurring item
function monthlyEquiv(r){
  const a=Number(r.amount);
  if(r.freq==="yearly") return a/12;
  if(r.freq==="quarterly") return a/3;
  return a;
}

// ══════════════════════════════════════════════════════════════════
function App({ onLock }){
  const [tab,setTab]         = useState("home");
  const [txns,setTxns]       = useState([]);
  const [recurring,setRec]   = useState([]);
  const [goals,setGoals]     = useState([]);
  const [sync,setSync]       = useState({ url:"", token:"", lastSync:null });
  const [modal,setModal]     = useState(null);
  const [toast,setToast]     = useState(null);
  const [loaded,setLoaded]   = useState(false);
  const [month,setMonth]     = useState(today().slice(0,7));
  const [year,setYear]       = useState(today().slice(0,4));

  useEffect(()=>{ (async()=>{
    const t=await load(KEYS.txns), r=await load(KEYS.recurring), g=await load(KEYS.goals), s=await load(KEYS.sync);
    if(t)setTxns(t); if(r)setRec(r); if(g)setGoals(g); if(s)setSync(s);
    setLoaded(true);
  })(); },[]);
  useEffect(()=>{ if(loaded)save(KEYS.txns,txns); },[txns,loaded]);
  useEffect(()=>{ if(loaded)save(KEYS.recurring,recurring); },[recurring,loaded]);
  useEffect(()=>{ if(loaded)save(KEYS.goals,goals); },[goals,loaded]);
  useEffect(()=>{ if(loaded)save(KEYS.sync,sync); },[sync,loaded]);

  const showToast=(msg,type="success")=>{ setToast({msg,type}); setTimeout(()=>setToast(null),2500); };

  const addTx=(tx)=>{ setTxns(p=>[{...tx,id:uid(),createdAt:new Date().toISOString()},...p]); showToast("記帳成功 ✓"); };
  const delTx=(id)=>{ setTxns(p=>p.filter(t=>t.id!==id)); showToast("已刪除","warn"); };
  const addRec=(r)=>{ setRec(p=>[{...r,id:uid()},...p]); showToast("固定扣款已新增 ✓"); };
  const delRec=(id)=>setRec(p=>p.filter(r=>r.id!==id));
  const addGoal=(g)=>{ setGoals(p=>[{...g,id:uid(),saved:Number(g.saved)||0},...p]); showToast("目標已建立 🎯"); };
  const delGoal=(id)=>setGoals(p=>p.filter(g=>g.id!==id));
  const updateGoal=(id,amt)=>{ setGoals(p=>p.map(g=>g.id===id?{...g,saved:Math.max(0,g.saved+amt)}:g)); showToast("已更新存款 ✓"); };

  const exportCSV=()=>{
    const rows=[["日期","類型","分類","金額","備註"]];
    txns.forEach(t=>rows.push([t.date,TYPE_LABEL[t.type],t.category,t.amount,t.note||""]));
    dl("\uFEFF"+rows.map(r=>r.join(",")).join("\n"),"記帳紀錄.csv","text/csv");
    showToast("CSV 已匯出");
  };
  const exportJSON=()=>{
    dl(JSON.stringify({txns,recurring,goals},null,2),"記帳備份.json","application/json");
    showToast("JSON 備份已匯出");
  };
  const importJSON=(data)=>{
    if(data.txns)setTxns(data.txns);
    if(data.recurring)setRec(data.recurring);
    if(data.goals)setGoals(data.goals);
    showToast("資料已匯入 ✓");
  };

  // ── Cloud sync via Google Apps Script (token auth + end-to-end encryption) ──
  const pushCloud=async()=>{
    if(!sync.url){ showToast("請先設定同步網址","warn"); return; }
    if(!sync.token){ showToast("請先設定同步密鑰","warn"); return; }
    showToast("加密上傳中…");
    try{
      // encrypt the whole payload locally; cloud only stores ciphertext
      const blob = await e2eeEncrypt(sync.token, {txns,recurring,goals});
      await fetch(sync.url,{ method:"POST", mode:"no-cors",
        headers:{"Content-Type":"text/plain;charset=utf-8"},
        body:JSON.stringify({ action:"push", token:sync.token, enc:blob }) });
      setSync(s=>({...s,lastSync:new Date().toISOString()}));
      showToast("已加密上傳到雲端 🔐☁️");
    }catch{ showToast("上傳失敗，請檢查網址","warn"); }
  };
  const pullCloud=async()=>{
    if(!sync.url){ showToast("請先設定同步網址","warn"); return; }
    if(!sync.token){ showToast("請先設定同步密鑰","warn"); return; }
    showToast("下載解密中…");
    try{
      const res=await fetch(sync.url+"?action=pull&token="+encodeURIComponent(sync.token));
      const data=await res.json();
      if(data.error){ showToast("密鑰錯誤，存取被拒","warn"); return; }
      if(!data.enc){ showToast("雲端尚無資料","warn"); return; }
      let obj;
      try{ obj = await e2eeDecrypt(sync.token, data.enc); }
      catch{ showToast("解密失敗，密鑰不符","warn"); return; }
      if(obj.txns)setTxns(obj.txns);
      if(obj.recurring)setRec(obj.recurring);
      if(obj.goals)setGoals(obj.goals);
      setSync(s=>({...s,lastSync:new Date().toISOString()}));
      showToast("已從雲端下載並解密 🔐");
    }catch{ showToast("下載失敗，請檢查網址","warn"); }
  };

  // stats
  const mTx = txns.filter(t=>t.date.startsWith(month));
  const mInc=sum(mTx,"income"), mExp=sum(mTx,"expense"), mSav=sum(mTx,"saving");
  const recMonthly=recurring.reduce((s,r)=>s+monthlyEquiv(r),0);
  const balance=mInc-mExp-mSav;

  if(!loaded) return <div style={S.loadWrap}><div style={S.spinner}/><p style={{color:"#8E8E93",marginTop:12,fontSize:14}}>載入中…</p></div>;

  return (
    <div style={S.shell}>
      <div style={S.statusBar}/>
      <div style={S.content}>
        {tab==="home"     && <Home {...{mTx,mInc,mExp,mSav,recMonthly,balance,month,setMonth,delTx,setModal,recurring,goals}}/>}
        {tab==="txns"     && <Txns {...{txns,delTx,month,setMonth}}/>}
        {tab==="recurring"&& <Recurring {...{recurring,delRec,setModal}}/>}
        {tab==="goals"    && <Goals {...{goals,delGoal,updateGoal,setModal}}/>}
        {tab==="stats"    && <Stats {...{txns,recurring,month,setMonth,year,setYear}}/>}
        {tab==="more"     && <More {...{exportCSV,exportJSON,importJSON,sync,setSync,pushCloud,pullCloud,showToast,onLock}}/>}
      </div>
      <TabBar tab={tab} setTab={setTab}/>
      <button style={S.fab} onClick={()=>setModal("add")}>＋</button>

      {modal==="add"      && <AddModal onAdd={addTx} onClose={()=>setModal(null)} onVoice={()=>setModal("voice")} onReceipt={()=>setModal("receipt")} onCSV={()=>setModal("csv")}/>}
      {modal==="voice"    && <VoiceModal onAdd={addTx} onClose={()=>setModal(null)} showToast={showToast}/>}
      {modal==="receipt"  && <ReceiptModal onAdd={addTx} onClose={()=>setModal(null)} showToast={showToast}/>}
      {modal==="csv"      && <CSVModal onImport={(t)=>{setTxns(p=>[...t,...p]);showToast(`已匯入 ${t.length} 筆`);}} onClose={()=>setModal(null)}/>}
      {modal==="recurring"&& <RecurringModal onAdd={addRec} onClose={()=>setModal(null)}/>}
      {modal==="goal"     && <GoalModal onAdd={addGoal} onClose={()=>setModal(null)}/>}

      {toast && <div style={{...S.toast,background:toast.type==="warn"?"#FF9500":"#34C759"}}>{toast.msg}</div>}
    </div>
  );
}
function sum(arr,type){ return arr.filter(t=>t.type===type).reduce((s,t)=>s+Number(t.amount),0); }
function dl(content,name,type){ const b=new Blob([content],{type:type+";charset=utf-8;"}); const u=URL.createObjectURL(b); const a=document.createElement("a"); a.href=u; a.download=name; a.click(); }

// ══════════════ HOME ══════════════════════════════════════════════
function Home({mTx,mInc,mExp,mSav,recMonthly,balance,month,setMonth,delTx,setModal,goals}){
  const recent=mTx.slice(0,12);
  const topGoal=goals[0];
  return (
    <div style={S.tab}>
      <MonthNav current={month} onChange={setMonth} mode="month"/>
      <div style={S.balanceCard}>
        <p style={S.balanceLabel}>本月結餘</p>
        <p style={{...S.balanceAmt,color:balance>=0?"#fff":"#FFD60A"}}>NT$ {fmtMoney(balance)}</p>
        <div style={S.balanceRow}>
          <Chip label="收入" val={mInc}/><Chip label="支出" val={mExp}/><Chip label="儲蓄" val={mSav}/>
        </div>
      </div>
      {recMonthly>0 && (
        <div style={S.recBanner} onClick={()=>setModal("recurring")}>
          <span>🔁</span><span style={{flex:1,marginLeft:8}}>固定扣款（月均攤）</span>
          <span style={{fontWeight:"600",color:"#FF9500"}}>NT$ {fmtMoney(recMonthly)}/月</span>
          <span style={{marginLeft:6,color:"#C7C7CC"}}>›</span>
        </div>
      )}
      {topGoal && (
        <div style={S.goalBanner} onClick={()=>setModal&&null}>
          <span>{ICONS[topGoal.category]||"🎯"}</span>
          <div style={{flex:1,marginLeft:8}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}>
              <span>{topGoal.name}</span>
              <span style={{color:"#34C759",fontWeight:"600"}}>{Math.round(topGoal.saved/topGoal.target*100)}%</span>
            </div>
            <div style={S.progBg}><div style={{...S.progFill,width:`${Math.min(100,topGoal.saved/topGoal.target*100)}%`}}/></div>
          </div>
        </div>
      )}
      <div style={S.quickRow}>
        {[["🖊","手動",()=>setModal("add")],["📷","掃描",()=>setModal("receipt")],["🎙","語音",()=>setModal("voice")],["🎯","目標",()=>setModal("goal")]].map(([i,l,f])=>(
          <button key={l} style={S.quickBtn} onClick={f}><span style={{fontSize:22}}>{i}</span><span style={S.quickLabel}>{l}</span></button>
        ))}
      </div>
      <Section title="近期記錄" sub={mTx.length?`共 ${mTx.length} 筆`:""}/>
      {recent.length===0 ? <Empty icon="📋" msg="本月還沒有記錄，點 ＋ 開始記帳"/> : recent.map(t=><TxRow key={t.id} tx={t} onDelete={delTx}/>)}
      <div style={{height:100}}/>
    </div>
  );
}

// ══════════════ TXNS ══════════════════════════════════════════════
function Txns({txns,delTx,month,setMonth}){
  const [f,setF]=useState("all");
  const list=txns.filter(t=>t.date.startsWith(month)&&(f==="all"||t.type===f));
  return (
    <div style={S.tab}>
      <MonthNav current={month} onChange={setMonth} mode="month"/>
      <div style={S.filterRow}>
        {[["all","全部"],["expense","支出"],["income","收入"],["saving","儲蓄"]].map(([v,l])=>(
          <button key={v} style={{...S.filterBtn,...(f===v?S.filterActive:{})}} onClick={()=>setF(v)}>{l}</button>
        ))}
      </div>
      {list.length===0 ? <Empty icon="🔍" msg="沒有符合的記錄"/> : list.map(t=><TxRow key={t.id} tx={t} onDelete={delTx} showDate/>)}

// ══════════════ RECURRING ═════════════════════════════════════════
function Recurring({recurring,delRec,setModal}){
  const monthly=recurring.filter(r=>r.freq!=="yearly"&&r.freq!=="quarterly");
  const periodic=recurring.filter(r=>r.freq==="yearly"||r.freq==="quarterly");
  const totalMonthEquiv=recurring.reduce((s,r)=>s+monthlyEquiv(r),0);
  const totalYear=recurring.reduce((s,r)=>{
    if(r.freq==="yearly")return s+Number(r.amount);
    if(r.freq==="quarterly")return s+Number(r.amount)*4;
    return s+Number(r.amount)*12;
  },0);
  return (
    <div style={S.tab}>
      <div style={S.pageTitle}>固定扣款</div>
      <div style={S.recTotal}>
        <div style={{display:"flex",justifyContent:"space-between"}}>
          <div><p style={S.miniLabel}>月均攤</p><p style={{...S.bigNum,color:"#FF9500"}}>NT$ {fmtMoney(totalMonthEquiv)}</p></div>
          <div style={{textAlign:"right"}}><p style={S.miniLabel}>年度總額</p><p style={{...S.bigNum,color:"#FF9500"}}>NT$ {fmtMoney(totalYear)}</p></div>
        </div>
      </div>
      {recurring.length===0 && <Empty icon="🔁" msg="尚未設定固定扣款"/>}
      {monthly.length>0 && <Section title="每月扣款"/>}
      {monthly.map(r=><RecRow key={r.id} r={r} onDelete={delRec}/>)}
      {periodic.length>0 && <Section title="年度 / 季度扣款"/>}
      {periodic.map(r=><RecRow key={r.id} r={r} onDelete={delRec}/>)}
      <button style={S.addRecBtn} onClick={()=>setModal("recurring")}>＋ 新增固定扣款</button>
      <div style={{height:100}}/>
    </div>
  );
}
function RecRow({r,onDelete}){
  const isYearly=r.freq==="yearly";

    <div style={S.recRow}>
      <span style={S.catIcon}>{ICONS[r.category]||"🔁"}</span>
      <div style={{flex:1}}>
        <p style={{margin:0,fontWeight:"600",fontSize:15}}>{r.name}</p>
        <p style={{margin:0,fontSize:12,color:"#8E8E93"}}>
          {r.category} · {FREQ_LABEL[r.freq]||"每月"}

// ══════════════ GOALS ═════════════════════════════════════════════
function Goals({goals,delGoal,updateGoal,setModal}){
  const [adjust,setAdjust]=useState(null);
  const [amt,setAmt]=useState("");
  const totalSaved=goals.reduce((s,g)=>s+g.saved,0);
  const totalTarget=goals.reduce((s,g)=>s+Number(g.target),0);
  return (
    <div style={S.tab}>
      <div style={S.pageTitle}>存款目標</div>
      <div style={S.goalSummary}>
        <p style={S.miniLabel}>總進度</p>

        <div style={S.progBg}><div style={{...S.progFill,width:`${totalTarget>0?Math.min(100,totalSaved/totalTarget*100):0}%`}}/></div>
      </div>
      {goals.length===0 ? <Empty icon="🎯" msg="尚未建立存款目標"/> : goals.map(g=>{
        const pct=Math.min(100,Math.round(g.saved/g.target*100));
        const done=g.saved>=g.target;
        return (
          <div key={g.id} style={S.goalCard}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <span style={{fontSize:24}}>{ICONS[g.category]||"🎯"}</span>
              <div style={{flex:1}}>
                <p style={{margin:0,fontWeight:"600",fontSize:16}}>{g.name} {done&&"✅"}</p>
                <p style={{margin:0,fontSize:12,color:"#8E8E93"}}>{g.category}{g.deadline?` · 目標 ${g.deadline}`:""}</p>
              </div>
              <button style={S.delBtn} onClick={()=>delGoal(g.id)}>✕</button>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}>
              <span style={{fontWeight:"600",color:"#34C759"}}>NT$ {fmtMoney(g.saved)}</span>
              <span style={{color:"#8E8E93"}}>/ NT$ {fmtMoney(g.target)} ({pct}%)</span>
            </div>
            <div style={S.progBg}><div style={{...S.progFill,width:`${pct}%`,background:done?"#34C759":"#007AFF"}}/></div>
            {adjust===g.id ? (
              <div style={{display:"flex",gap:6,marginTop:10}}>
                <input style={{...S.inputField,marginBottom:0,flex:1}} type="number" placeholder="金額" value={amt} onChange={e=>setAmt(e.target.value)} inputMode="numeric"/>
                <button style={S.goalActionBtn} onClick={()=>{updateGoal(g.id,Number(amt));setAdjust(null);setAmt("");}}>＋存入</button>
                <button style={{...S.goalActionBtn,background:"#FF3B30"}} onClick={()=>{updateGoal(g.id,-Number(amt));setAdjust(null);setAmt("");}}>－提取</button>
              </div>
            ):(
              <button style={S.depositBtn} onClick={()=>setAdjust(g.id)}>調整存款</button>
            )}
          </div>
        );
      })}
      <button style={S.addRecBtn} onClick={()=>setModal("goal")}>＋ 新增存款目標</button>
      <div style={{height:100}}/>
    </div>
  );
}

// ══════════════ STATS ═════════════════════════════════════════════
function Stats({txns,recurring,month,setMonth,year,setYear}){
  const [view,setView]=useState("month"); // month | year

  if(view==="month"){
    const mTx=txns.filter(t=>t.date.startsWith(month));
    const expTx=mTx.filter(t=>t.type==="expense");
    const catMap={}; expTx.forEach(t=>catMap[t.category]=(catMap[t.category]||0)+Number(t.amount));
    const catList=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
    const totalE=catList.reduce((s,[,v])=>s+v,0);
    // 6 month bars
    const months=[];
    for(let i=5;i>=0;i--){ const d=new Date(month+"-01"); d.setMonth(d.getMonth()-i); const mk=d.toISOString().slice(0,7);
      months.push({mk,label:`${d.getMonth()+1}月`,inc:sum(txns.filter(t=>t.date.startsWith(mk)),"income"),exp:sum(txns.filter(t=>t.date.startsWith(mk)),"expense")}); }
    const max=Math.max(...months.map(m=>Math.max(m.inc,m.exp)),1);
    return (
      <div style={S.tab}>
        <ViewToggle view={view} setView={setView}/>
        <MonthNav current={month} onChange={setMonth} mode="month"/>
        <BarChart title="近 6 個月收支" data={months} max={max}/>
        <CatBreakdown title="本月支出分類" catList={catList} total={totalE}/>
        <div style={{height:100}}/>
      </div>
    );
  }

  // YEAR view
  const yTx=txns.filter(t=>t.date.startsWith(year));
  const yInc=sum(yTx,"income"), yExp=sum(yTx,"expense"), ySav=sum(yTx,"saving");
  // 12 month bars
  const months12=[];
  for(let m=1;m<=12;m++){ const mk=`${year}-${String(m).padStart(2,"0")}`;
    months12.push({mk,label:`${m}`,inc:sum(txns.filter(t=>t.date.startsWith(mk)),"income"),exp:sum(txns.filter(t=>t.date.startsWith(mk)),"expense")}); }
  const max12=Math.max(...months12.map(m=>Math.max(m.inc,m.exp)),1);
  const catMap={}; yTx.filter(t=>t.type==="expense").forEach(t=>catMap[t.category]=(catMap[t.category]||0)+Number(t.amount));
  const catList=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const recYear=recurring.reduce((s,r)=>r.freq==="yearly"?s+Number(r.amount):r.freq==="quarterly"?s+Number(r.amount)*4:s+Number(r.amount)*12,0);
  return (
    <div style={S.tab}>
      <ViewToggle view={view} setView={setView}/>
      <MonthNav current={year} onChange={setYear} mode="year"/>
      <div style={S.card}>
        <p style={S.cardTitle}>{year} 年度總覽</p>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:12}}>
          <YearStat label="總收入" val={yInc} color="#34C759"/>
          <YearStat label="總支出" val={yExp} color="#FF3B30"/>
          <YearStat label="總儲蓄" val={ySav} color="#007AFF"/>
        </div>
        <div style={{borderTop:"1px solid #F2F2F7",marginTop:12,paddingTop:12,display:"flex",justifyContent:"space-between"}}>
          <span style={{fontSize:13,color:"#8E8E93"}}>年度結餘</span>
          <span style={{fontWeight:"700",color:yInc-yExp-ySav>=0?"#34C759":"#FF3B30"}}>NT$ {fmtMoney(yInc-yExp-ySav)}</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
          <span style={{fontSize:13,color:"#8E8E93"}}>固定扣款年支出</span>
          <span style={{fontWeight:"600",color:"#FF9500"}}>NT$ {fmtMoney(recYear)}</span>
        </div>
      </div>
      <BarChart title={`${year} 年每月收支`} data={months12} max={max12} compact/>
      <CatBreakdown title="年度支出分類" catList={catList} total={catList.reduce((s,[,v])=>s+v,0)}/>
      <div style={{height:100}}/>
    </div>
  );
}

  const [urlInput,setUrlInput]=useState(sync.url||"");
  const [tokenInput,setTokenInput]=useState(sync.token||"");
  const [showScript,setShowScript]=useState(false);
  const [showSupa,setShowSupa]=useState(false);
  const [bioOn,setBioOn]=useState(bioEnabled());
  const fileRef=useRef();
  const baseURL=typeof window!=="undefined"?window.location.href.split("?")[0]:"";
  const apiBase=`${baseURL}?api=1`;

  const onJSONFile=(e)=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader();
    r.onload=ev=>{ try{ importJSON(JSON.parse(ev.target.result)); }catch{ showToast("檔案格式錯誤","warn"); } }; r.readAsText(f); };

  const genToken=()=>{
    const arr=crypto.getRandomValues(new Uint8Array(18));

    const pin=prompt(`請輸入你的 ${PIN_LEN} 位數密碼以啟用生物辨識`);
    if(!pin) return;
    try{ await bioRegister(pin); setBioOn(true); showToast("生物辨識已啟用 👤"); }
    catch(e){ showToast(e.message==="PIN 錯誤"?"密碼錯誤":"啟用失敗或被取消","warn"); }
  };

  const gasScript=`// 把下面這行的密鑰換成 App 裡「同步密鑰」欄位的同一組字串
var SECRET = "貼上你的同步密鑰";

function doGet(e){
  if((e.parameter.token||"") !== SECRET){
    return ContentService.createTextOutput(JSON.stringify({error:"unauthorized"})).setMimeType(ContentService.MimeType.JSON);
  }
  var sheet=SpreadsheetApp.getActiveSpreadsheet().getSheetByName("data")||SpreadsheetApp.getActiveSpreadsheet().insertSheet("data");
  var cell=sheet.getRange("A1").getValue();
  // resp wraps the stored ciphertext; cloud never sees plaintext
  return ContentService.createTextOutput(cell||"{}").setMimeType(ContentService.MimeType.JSON);
}
function doPost(e){
  var body=JSON.parse(e.postData.contents);
  if((body.token||"") !== SECRET){
    return ContentService.createTextOutput(JSON.stringify({error:"unauthorized"}));
  }
  var sheet=SpreadsheetApp.getActiveSpreadsheet().getSheetByName("data")||SpreadsheetApp.getActiveSpreadsheet().insertSheet("data");
  if(body.action==="push"){
    // store only the encrypted blob
    sheet.getRange("A1").setValue(JSON.stringify({enc: body.enc}));
  }
  return ContentService.createTextOutput(JSON.stringify({ok:true}));
}`;

  const supaSchema=`-- 在 Supabase SQL Editor 執行，建立資料表

);

alter table fin_data enable row level security;
create policy "own row" on fin_data
  for all using (auth.uid()::text = id) with check (auth.uid()::text = id);`;

  return (
    <div style={S.tab}>
      <div style={S.pageTitle}>同步與工具</div>

          • 連續輸錯 {MAX_FAILS} 次將暫時鎖定<br/>

function VoiceModal({onAdd,onClose,showToast}){
  const [listening,setListening]=useState(false);
  const [transcript,setTranscript]=useState("");
  const [parsed,setParsed]=useState(null);
  const [loading,setLoading]=useState(false);
  const recRef=useRef(null);
  const start=()=>{ const SR=window.SpeechRecognition||window.webkitSpeechRecognition; if(!SR){showToast("此瀏覽器不支援語音","warn");return;}
    const r=new SR(); r.lang="zh-TW"; r.interimResults=true;
    r.onresult=e=>setTranscript(Array.from(e.results).map(x=>x[0].transcript).join(""));
    r.onend=()=>setListening(false); r.start(); setListening(true); recRef.current=r; };
  const stop=()=>{ recRef.current?.stop(); setListening(false); };
  const parse=async()=>{ if(!transcript)return; setLoading(true);
    try{ const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:300,messages:[{role:"user",content:`從語音記帳文字提取資訊，只回傳JSON：「${transcript}」\n格式：{"type":"expense|income|saving","category":"分類","amount":數字,"note":"備註","date":"YYYY-MM-DD"}\n今天：${today()}`}]})});
      const data=await res.json(); const text=data.content?.map(c=>c.text||"").join("")||"";
      setParsed(JSON.parse(text.replace(/```json|```/g,"").trim()));
    }catch{ showToast("解析失敗","warn"); } setLoading(false); };
  return (
    <Modal title="語音記帳" onClose={onClose}>
      <div style={{textAlign:"center",padding:"20px 0"}}>
        <button style={{...S.voiceBtn,background:listening?"#FF3B30":"#007AFF"}} onClick={listening?stop:start}>{listening?"⏹ 停止":"🎙 開始說話"}</button>
        {listening && <p style={{color:"#FF3B30",fontSize:13,marginTop:8}}>聆聽中…</p>}
      </div>
      {transcript && (<><div style={S.transcriptBox}><strong>識別：</strong>{transcript}</div>
        <button style={S.primaryBtn} onClick={parse} disabled={loading}>{loading?"解析中…":"🤖 AI 解析"}</button></>)}
      {parsed && (<div style={{...S.card,marginTop:12}}><p style={{fontWeight:"600",marginBottom:8}}>解析結果</p>
        {[["類型",TYPE_LABEL[parsed.type]],["分類",parsed.category],["金額","NT$ "+fmtMoney(parsed.amount)],["備註",parsed.note],["日期",parsed.date]].map(([k,v])=>v?<div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:"#8E8E93",fontSize:13}}>{k}</span><span style={{fontSize:13}}>{v}</span></div>:null)}
        <button style={{...S.primaryBtn,marginTop:8}} onClick={()=>{onAdd(parsed);onClose();}}>確認記帳</button></div>)}
      <p style={{fontSize:12,color:"#8E8E93",textAlign:"center",marginTop:12}}>範例：「午餐花一百五十元」「收到薪水五萬」</p>
    </Modal>
  );
}

function ReceiptModal({onAdd,onClose,showToast}){
  const [preview,setPreview]=useState(null);
  const [b64,setB64]=useState(null);
  const [loading,setLoading]=useState(false);
  const [parsed,setParsed]=useState(null);
  const inRef=useRef();
  const onFile=(e)=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader();
    r.onload=ev=>{ setPreview(ev.target.result); setB64(ev.target.result.split(",")[1]); }; r.readAsDataURL(f); };
  const scan=async()=>{ if(!b64){showToast("請先選圖片","warn");return;} setLoading(true);
    try{ const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:400,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},{type:"text",text:`分析收據，只回傳JSON：{"type":"expense","category":"餐飲|購物|交通|其他","amount":數字,"note":"商家","date":"YYYY-MM-DD"}\n今天：${today()}`}]}]})});
      const data=await res.json(); const text=data.content?.map(c=>c.text||"").join("")||"";
      setParsed(JSON.parse(text.replace(/```json|```/g,"").trim()));
    }catch{ showToast("掃描失敗","warn"); } setLoading(false); };
  return (
    <Modal title="掃描收據" onClose={onClose}>
      <input ref={inRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={onFile}/>
      <button style={S.primaryBtn} onClick={()=>inRef.current?.click()}>📷 拍照 / 選擇圖片</button>
      {preview && <img src={preview} style={{width:"100%",borderRadius:12,marginTop:12,maxHeight:200,objectFit:"cover"}} alt="receipt"/>}
      {b64 && !parsed && <button style={{...S.primaryBtn,marginTop:8}} onClick={scan} disabled={loading}>{loading?"掃描中…":"🔍 AI 掃描辨識"}</button>}
      {parsed && (<div style={{...S.card,marginTop:12}}><p style={{fontWeight:"600",marginBottom:8}}>掃描結果</p>
        {[["分類",parsed.category],["金額","NT$ "+fmtMoney(parsed.amount)],["備註",parsed.note],["日期",parsed.date]].map(([k,v])=>v?<div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:"#8E8E93",fontSize:13}}>{k}</span><span style={{fontSize:13}}>{v}</span></div>:null)}
        <button style={{...S.primaryBtn,marginTop:8}} onClick={()=>{onAdd(parsed);onClose();}}>確認記帳</button></div>)}
    </Modal>
  );
}

function CSVModal({onImport,onClose}){
  const [err,setErr]=useState("");
  const inRef=useRef();
  const onFile=(e)=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader();
    r.onload=ev=>{ try{ const rows=ev.target.result.replace(/^\uFEFF/,"").split("\n").filter(x=>x.trim());
      const h=rows[0].split(","); const iD=h.indexOf("日期"),iT=h.indexOf("類型"),iC=h.indexOf("分類"),iA=h.indexOf("金額"),iN=h.indexOf("備註");
      const rev=Object.fromEntries(Object.entries(TYPE_LABEL).map(([k,v])=>[v,k]));
      const txs=rows.slice(1).map(row=>{ const c=row.split(",");
        return {id:uid(),createdAt:new Date().toISOString(),date:iD>=0?c[iD]:today(),type:iT>=0?(rev[c[iT]]||"expense"):"expense",category:iC>=0?c[iC]:"其他",amount:iA>=0?Number(c[iA])||0:0,note:iN>=0?c[iN]:""};
      }).filter(t=>t.amount>0); onImport(txs); onClose();
    }catch{ setErr("格式錯誤，需含欄位：日期,類型,分類,金額,備註"); } }; r.readAsText(f,"UTF-8"); };
  return (
    <Modal title="CSV 匯入" onClose={onClose}>
      <div style={{...S.card,background:"#F0F7FF"}}><p style={{fontSize:13,margin:0,color:"#005BBB"}}>需含標題行：<br/><code>日期,類型,分類,金額,備註</code></p></div>
      <input ref={inRef} type="file" accept=".csv" style={{display:"none"}} onChange={onFile}/>
      <button style={{...S.primaryBtn,marginTop:12}} onClick={()=>inRef.current?.click()}>選擇 CSV 檔案</button>
      {err && <p style={{color:"#FF3B30",fontSize:13,marginTop:8}}>{err}</p>}
    </Modal>
  );
}

function Chip({label,val}){ return <div style={{textAlign:"center"}}><p style={{margin:0,fontSize:11,color:"rgba(255,255,255,0.7)"}}>{label}</p><p style={{margin:0,fontSize:14,fontWeight:"600",color:"#fff"}}>NT$ {fmtMoney(val)}</p></div>; }
function MonthNav({current,onChange,mode}){
  const prev=()=>{ if(mode==="year"){ onChange(String(Number(current)-1)); } else { const d=new Date(current+"-01"); d.setMonth(d.getMonth()-1); onChange(d.toISOString().slice(0,7)); } };
  const next=()=>{ if(mode==="year"){ const n=String(Number(current)+1); if(n<=today().slice(0,4))onChange(n); } else { const d=new Date(current+"-01"); d.setMonth(d.getMonth()+1); const nm=d.toISOString().slice(0,7); if(nm<=today().slice(0,7))onChange(nm); } };
  const label=mode==="year"?`${current} 年`:`${current.split("-")[0]} 年 ${Number(current.split("-")[1])} 月`;
  return <div style={S.monthNav}><button style={S.navArrow} onClick={prev}>‹</button><span style={{fontWeight:"600",fontSize:16}}>{label}</span><button style={S.navArrow} onClick={next}>›</button></div>;
}

// ══════════════ LOCK SCREEN ═══════════════════════════════════════
function LockGate({ onUnlocked }){
  const existing = hasPIN();
  const [mode,setMode]   = useState(existing ? "unlock" : "create");
  const [pin,setPin]     = useState("");
  const [firstPin,setFirstPin] = useState("");
  const [err,setErr]     = useState("");
  const [busy,setBusy]   = useState(false);
  const [lockLeft,setLockLeft] = useState(lockoutRemaining());

  // countdown timer when locked out
  useEffect(()=>{
    if(lockLeft<=0) return;
    const id=setInterval(()=>{ const r=lockoutRemaining(); setLockLeft(r); if(r<=0)clearInterval(id); },500);
    return ()=>clearInterval(id);
  },[lockLeft]);

  // auto-prompt biometric on mount if enabled
  useEffect(()=>{
    if(existing && bioEnabled() && lockoutRemaining()<=0){ tryBio(); }
  },[]);

  const titles = {
    create:  { t:"設定 App 密碼", s:`建立一組 ${PIN_LEN} 位數密碼，用來鎖定與加密你的記帳資料` },
    confirm: { t:"再次輸入密碼", s:"請再輸入一次以確認" },
    unlock:  { t:"輸入密碼", s:`輸入你的 ${PIN_LEN} 位數密碼以解鎖` },
  };

  const tryBio = async () => {
    setErr("");
    const ok = await bioUnlock();
    if(ok) onUnlocked();
    else setErr("生物辨識失敗，請改用密碼");
  };

  const press = (d) => {
    if(busy || lockLeft>0) return;
    setErr("");
    const next = (pin + d).slice(0,PIN_LEN);
    setPin(next);
    if(next.length === PIN_LEN){ setBusy(true); setTimeout(()=>handleFull(next),120); }
  };
  const back = () => { setErr(""); setPin(p=>p.slice(0,-1)); };

  const handleFull = async (full) => {
    if(mode === "create"){
      setFirstPin(full); setPin(""); setMode("confirm"); setBusy(false);
    } else if(mode === "confirm"){
      if(full !== firstPin){ setErr("兩次密碼不一致，請重設"); setPin(""); setFirstPin(""); setMode("create"); setBusy(false); return; }
      await setupPIN(full);
      for(const k of Object.values(KEYS)){
        const raw = localStorage.getItem(k);
        if(raw && !raw.startsWith('{"iv"')){ try{ localStorage.setItem(k, await encryptStr(raw)); }catch{} }
      }
      onUnlocked();
    } else {
      const ok = await unlockPIN(full);
      if(ok){ onUnlocked(); }
      else {
        const left = lockoutRemaining();
        if(left>0){ setLockLeft(left); setErr(""); }
        else { const remaining = MAX_FAILS - failCount(); setErr(remaining>0?`密碼錯誤，還可嘗試 ${remaining} 次`:"密碼錯誤"); }
        setPin(""); setBusy(false);
      }
    }
  };

  const info = titles[mode];
  const lockedOut = lockLeft>0;
  return (
    <div style={S.lockWrap}>
      <div style={S.lockIcon}>{lockedOut?"⏳":"🔒"}</div>
      <h1 style={S.lockTitle}>{lockedOut?"已暫時鎖定":info.t}</h1>
      <p style={S.lockSub}>{lockedOut?`嘗試次數過多，請於 ${Math.ceil(lockLeft/1000)} 秒後再試`:info.s}</p>
      {!lockedOut && <div style={S.pinDots}>{Array.from({length:PIN_LEN}).map((_,i)=>(<div key={i} style={{...S.pinDot,...(i<pin.length?S.pinDotFill:{})}}/>))}</div>}
      {err && <p style={{color:"#FFD60A",fontSize:14,margin:"0 0 16px",fontWeight:"600"}}>{err}</p>}
      {!lockedOut && (
        <div style={S.pad}>
          {[1,2,3,4,5,6,7,8,9].map(n=>(<button key={n} style={S.padBtn} onClick={()=>press(String(n))}>{n}</button>))}
          <button style={S.padText} onClick={mode==="unlock"&&bioEnabled()?tryBio:undefined}>{mode==="unlock"&&bioEnabled()?"👤":" "}</button>
          <button style={S.padBtn} onClick={()=>press("0")}>0</button>
          <button style={S.padText} onClick={back}>⌫</button>
        </div>
      )}
      {mode==="unlock" && bioEnabled() && !lockedOut && (
        <button style={{...S.padText,marginTop:16,width:"auto",fontSize:14,color:"rgba(255,255,255,0.9)"}} onClick={tryBio}>👤 使用生物辨識解鎖</button>
      )}
      {mode==="unlock" && (
        <p style={{color:"rgba(255,255,255,0.6)",fontSize:11,marginTop:20,textAlign:"center",maxWidth:280,lineHeight:1.5}}>
          忘記密碼將無法解密資料。若要重設，需清除資料重新開始。
        </p>
      )}
    </div>
  );
}

// ══════════════ ROOT ══════════════════════════════════════════════
function Root(){
  const [unlocked,setUnlocked] = useState(false);
  // auto-lock when tab hidden for a while
  useEffect(()=>{
    let hiddenAt=null;
    const onVis=()=>{
      if(document.hidden){ hiddenAt=Date.now(); }
      else if(hiddenAt && Date.now()-hiddenAt > 5*60*1000){ // 5 min
        lockApp(); setUnlocked(false);
      }
    };
    document.addEventListener("visibilitychange",onVis);
    return ()=>document.removeEventListener("visibilitychange",onVis);
  },[]);
  if(!unlocked) return <LockGate onUnlocked={()=>setUnlocked(true)}/>;
  return <App onLock={()=>{ lockApp(); setUnlocked(false); }}/>;
}

if("serviceWorker" in navigator){ window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{})); }
ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
